<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Vault | Aura</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    .sidebar { background: var(--bg-elevated); border-right: 1px solid var(--glass-border); padding: 3rem 2rem; position: sticky; top: 0; height: 100vh; }
    .sidebar-nav { margin-top: 4rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .sidebar-link { padding: 1rem 1.5rem; color: var(--text-secondary); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.15em; font-weight: 600; border-radius: 2px; }
    .sidebar-link:hover, .sidebar-link.active { background: var(--glass); color: var(--primary); }
    .admin-main { padding: 4rem; overflow-y: auto; }
    .admin-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 2.5rem; margin-bottom: 2rem; }
    .data-table { width: 100%; border-collapse: collapse; margin-top: 2rem; }
    .data-table th { text-align: left; padding: 1rem; color: var(--primary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid var(--glass-border); }
    .data-table td { padding: 1.25rem 1rem; color: var(--text-secondary); font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .badge-pending { background: rgba(212, 175, 55, 0.1); color: var(--primary); }
    .badge-confirmed { background: rgba(40, 167, 69, 0.1); color: #28a745; }
    .btn-small { padding: 0.5rem 1rem; font-size: 0.7rem; margin-left: 0.5rem; }
  </style>
</head>
<body>

  <!-- Login View -->
  <div id="loginView" style="display: none;">
    <section class="hero" style="height: 100vh;">
       <img src="assets/images/hero.png" class="hero-video-bg" style="opacity: 0.1;">
       <div class="hero-content">
          <div class="form-card" style="max-width: 450px; padding: 3rem;">
             <div class="logo" style="margin-bottom: 2rem;">AURA</div>
             <h2 style="margin-bottom: 2rem; font-size: 1.8rem;">Admin Access</h2>
             <div id="loginAlert"></div>
             <form id="loginForm">
                <div class="input-group">
                   <label class="input-label">Identifer</label>
                   <input type="text" id="loginUsername" class="input-field" required placeholder="Administrator">
                </div>
                <div class="input-group" style="margin-bottom: 3rem;">
                   <label class="input-label">Passkey</label>
                   <input type="password" id="loginPassword" class="input-field" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Authorize</button>
             </form>
             <a href="index.html" class="footer-bottom" style="display: block; margin-top: 2rem; color: var(--text-secondary);">Return to Main Site</a>
          </div>
       </div>
    </section>
  </div>

  <!-- Dashboard View -->
  <div id="dashboardView" style="display: none;" class="admin-layout">
    <aside class="sidebar">
      <div class="logo">AURA</div>
      <nav class="sidebar-nav">
        <a href="#menu" class="sidebar-link active" id="navMenu">Menu Collection</a>
        <a href="#reservations" class="sidebar-link" id="navRes">Reservations</a>
        <a href="#messages" class="sidebar-link" id="navMessages">Inquiries</a>
        <a href="#" class="sidebar-link" id="navLogout" style="margin-top: 4rem; color: #ff4d4d; opacity: 0.7;">Sign Out</a>
      </nav>
    </aside>

    <main class="admin-main">
      <!-- Section: Menu -->
      <div id="tabMenu">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem;">
           <div>
              <span class="section-tag">Content Management</span>
              <h2>Menu Collection</h2>
           </div>
           <button class="btn btn-primary" style="padding: 0.8rem 1.5rem; font-size: 0.7rem;" onclick="document.getElementById('addMenuModal').style.display='block'">Add New Item</button>
        </div>

        <div id="addMenuModal" class="admin-card" style="display: none; border: 1px solid var(--primary);">
           <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
              <h3>Craft New Entry</h3>
              <button onclick="this.parentElement.parentElement.style.display='none'" style="background: none; border: none; color: #fff; cursor: pointer;">✕</button>
           </div>
           <div id="menuAlert"></div>
           <form id="addMenuForm">
              <div class="grid" style="grid-template-columns: 2fr 1fr; margin-bottom: 0;">
                 <div class="input-group">
                    <label class="input-label">Item Name</label>
                    <input type="text" name="name" class="input-field" required>
                 </div>
                 <div class="input-group">
                    <label class="input-label">Price ($)</label>
                    <input type="number" step="0.01" name="price" class="input-field" required>
                 </div>
              </div>
              <div class="grid" style="grid-template-columns: 1fr 2fr; margin-bottom: 0;">
                 <div class="input-group">
                    <label class="input-label">Category</label>
                    <select name="category" class="input-field" style="background: transparent;">
                       <option value="Starters">Starters</option>
                       <option value="Main Course">Main Course</option>
                       <option value="Desserts">Desserts</option>
                       <option value="Drinks">Drinks</option>
                    </select>
                 </div>
                 <div class="input-group">
                    <label class="input-label">Imagery URL</label>
                    <input type="text" name="imageUrl" class="input-field" required>
                 </div>
              </div>
              <div class="input-group">
                 <label class="input-label">Brief Description</label>
                 <textarea name="description" class="input-field" required rows="2"></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Archive to Collection</button>
           </form>
        </div>

        <div class="admin-card">
           <table class="data-table">
              <thead>
                 <tr>
                    <th>Entry</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Action</th>
                 </tr>
              </thead>
              <tbody id="menuTableBody"></tbody>
           </table>
        </div>
      </div>

      <!-- Section: Reservations -->
      <div id="tabRes" style="display: none;">
         <span class="section-tag">Logistics</span>
         <h2 style="margin-bottom: 3rem;">Reservations</h2>
         <div class="admin-card">
            <table class="data-table">
               <thead>
                  <tr>
                     <th>Schedule</th>
                     <th>Patron</th>
                     <th>Guests</th>
                     <th>Status</th>
                     <th>Action</th>
                  </tr>
               </thead>
               <tbody id="resTableBody"></tbody>
            </table>
         </div>
      </div>

      <!-- Section: Messages -->
      <div id="tabMessages" style="display: none;">
         <span class="section-tag">Communication</span>
         <h2 style="margin-bottom: 3rem;">Recent Inquiries</h2>
         <div id="messagesContainer"></div>
      </div>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import api from './js/api.js';
    import { showAlert } from './js/app.js';

    document.addEventListener('DOMContentLoaded', () => {
      const loginView = document.getElementById('loginView');
      const dashboardView = document.getElementById('dashboardView');
      
      const checkAuth = () => {
        const token = localStorage.getItem('adminToken');
        if (token) {
          loginView.style.display = 'none';
          dashboardView.style.display = 'grid';
          loadDashboardData();
        } else {
          loginView.style.display = 'block';
          dashboardView.style.display = 'none';
        }
      };

      // Login Logic
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        const { error, data } = await api.adminLogin({ username, password });
        if (error) {
          showAlert('loginAlert', error, 'alert-error');
        } else {
          localStorage.setItem('adminToken', data.token);
          checkAuth();
        }
      });

      // Sign Out
      document.getElementById('navLogout').addEventListener('click', () => {
        localStorage.removeItem('adminToken');
        window.location.reload();
      });

      // Tab Switching
      const tabs = {
        menu: { nav: document.getElementById('navMenu'), section: document.getElementById('tabMenu') },
        res: { nav: document.getElementById('navRes'), section: document.getElementById('tabRes') },
        messages: { nav: document.getElementById('navMessages'), section: document.getElementById('tabMessages') }
      };

      Object.keys(tabs).forEach(key => {
        tabs[key].nav.addEventListener('click', (e) => {
          e.preventDefault();
          Object.values(tabs).forEach(t => {
            t.nav.classList.remove('active');
            t.section.style.display = 'none';
          });
          tabs[key].nav.classList.add('active');
          tabs[key].section.style.display = 'block';
        });
      });

      // Dashboard Logic
      async function loadDashboardData() {
        // Load Menu
        const menuTbody = document.getElementById('menuTableBody');
        const menuData = await api.getMenu();
        if (!menuData.error) {
          menuTbody.innerHTML = menuData.data.map(item => `
            <tr>
              <td style="color:#fff; font-weight:500;">${item.name}</td>
              <td><span class="badge" style="border:1px solid var(--glass-border);">${item.category}</span></td>
              <td class="price-tag">$${item.price}</td>
              <td>
                 <button class="btn-outline btn-small" style="color:#ff4d4d;" onclick="window.deleteItem('${item.id}')">Remove</button>
              </td>
            </tr>
          `).join('');
        }

        // Load Reservations
        const resTbody = document.getElementById('resTableBody');
        const resData = await api.getReservations();
        if (!resData.error && resData.data) {
          resTbody.innerHTML = resData.data.map(res => `
            <tr>
              <td style="color:#fff;">${res.date} <br> <span style="font-size:0.75rem; color:var(--text-secondary)">${res.time}</span></td>
              <td>${res.name} <br> <span style="font-size:0.75rem; color:var(--text-secondary)">${res.email}</span></td>
              <td>${res.guests} Guests</td>
              <td><span class="badge badge-${res.status.toLowerCase()}">${res.status}</span></td>
              <td>
                 <button class="btn-outline btn-small" onclick="window.updateStatus('${res.id}', 'Confirmed')">Confirm</button>
              </td>
            </tr>
          `).join('');
        }

        // Load Messages
        const msgContainer = document.getElementById('messagesContainer');
        const msgData = await api.getContacts();
        if (!msgData.error && msgData.data) {
          msgContainer.innerHTML = msgData.data.map(msg => `
            <div class="admin-card">
              <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
                <h4 style="color:#fff;">${msg.name} <span style="font-weight:300; font-size:0.9rem; margin-left:1rem; opacity:0.6;">&lt;${msg.email}&gt;</span></h4>
                <span class="section-tag">${new Date(msg.created_at).toLocaleDateString()}</span>
              </div>
              <p class="footer-text" style="font-size:1.1rem; line-height:1.6;">${msg.message}</p>
            </div>
          `).join('');
        }
      }

      // Add Menu Item
      document.getElementById('addMenuForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        data.price = Number(data.price);

        const res = await api.addMenuItem(data);
        if (res.error) {
          showAlert('menuAlert', res.error, 'alert-error');
        } else {
          showAlert('menuAlert', 'Entry successfully archived.', 'alert-success');
          e.target.reset();
          loadDashboardData();
        }
      });

      // Global window functions for table actions
      window.deleteItem = async (id) => {
        if(confirm('Are you sure you want to remove this entry?')) {
          const res = await api.deleteMenuItem(id);
          if(!res.error) loadDashboardData();
        }
      };

      window.updateStatus = async (id, status) => {
         // In a full implementation, we'd have api.updateReservationStatus
         // For now, this is a placeholder to show the action works
         alert('Update status to ' + status + ' (Requires API endpoint integration)');
      };

      checkAuth();
    });
  </script>
</body>
</html>
