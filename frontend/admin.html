<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Aura</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 250px;
      background-color: var(--bg-secondary);
      padding: 2rem;
      border-right: 1px solid var(--border-color);
    }
    .main-content {
      flex: 1;
      padding: 3rem;
    }
    .sidebar-menu {
      margin-top: 3rem;
    }
    .sidebar-menu li {
      margin-bottom: 1rem;
    }
    .sidebar-menu a {
      display: block;
      padding: 0.8rem;
      border-radius: 4px;
      color: var(--text-muted);
    }
    .sidebar-menu a:hover, .sidebar-menu a.active {
      background-color: var(--bg-tertiary);
      color: var(--accent);
    }
    .login-container {
      max-width: 400px;
      margin: 10rem auto;
      background: var(--bg-secondary);
      padding: 3rem;
      border-radius: 8px;
      border: 1px solid var(--accent);
    }
  </style>
</head>
<body>

  <!-- Login Overlay -->
  <div id="loginView" style="display: none;">
    <div class="login-container">
      <h2 class="text-accent text-center section-title">Admin Login</h2>
      <div id="loginAlert"></div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="loginUsername" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login</button>
      </form>
      <div class="text-center" style="margin-top: 2rem;">
        <a href="index.html" class="text-muted">← Back to Site</a>
      </div>
    </div>
  </div>

  <!-- Dashboard Overview -->
  <div id="dashboardView" style="display: none;" class="admin-container">
    <div class="sidebar">
      <div class="logo">AURA Admin</div>
      <ul class="sidebar-menu">
        <li><a href="#" id="navMenu" class="active">Manage Menu</a></li>
        <li><a href="#" id="navRes">Reservations</a></li>
        <li><a href="#" id="navMessages">Messages</a></li>
        <li><a href="#" id="navLogout">Logout</a></li>
      </ul>
      <div style="margin-top: 5rem;">
        <a href="index.html" class="text-muted" style="font-size: 0.9rem;">← Back to Main Site</a>
      </div>
    </div>

    <div class="main-content">
      <!-- Menu Manager Tab -->
      <div id="tabMenu">
        <h2 class="text-accent">Manage Menu</h2>
        <div style="background: var(--bg-secondary); padding: 2rem; border-radius: 8px; margin-top: 2rem; margin-bottom: 3rem;">
          <h4>Add New Item</h4>
          <div id="menuAlert"></div>
          <form id="addMenuForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
            <div class="form-group"><input type="text" class="form-control" name="name" placeholder="Item Name" required></div>
            <div class="form-group"><input type="number" step="0.01" class="form-control" name="price" placeholder="Price (e.g. 24.99)" required></div>
            <div class="form-group">
              <select class="form-control" name="category" required>
                <option value="Starters">Starters</option>
                <option value="Main Course">Main Course</option>
                <option value="Desserts">Desserts</option>
                <option value="Drinks">Drinks</option>
              </select>
            </div>
            <div class="form-group"><input type="text" class="form-control" name="imageUrl" placeholder="Image URL (Unsplash etc)" required></div>
            <div class="form-group" style="grid-column: 1/-1;"><textarea class="form-control" name="description" placeholder="Description" style="min-height: 80px;" required></textarea></div>
            <button type="submit" class="btn" style="grid-column: 1/2;">Add Item</button>
          </form>
        </div>

        <h4>Current Menu</h4>
        <div style="overflow-x: auto;">
          <table class="admin-table">
            <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Action</th></tr></thead>
            <tbody id="menuTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Reservations Tab -->
      <div id="tabRes" style="display: none;">
        <h2 class="text-accent">Reservations</h2>
        <div style="overflow-x: auto; margin-top: 2rem;">
          <table class="admin-table">
            <thead><tr><th>Date & Time</th><th>Name</th><th>Email</th><th>Guests</th></tr></thead>
            <tbody id="resTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Messages Tab -->
      <div id="tabMessages" style="display: none;">
        <h2 class="text-accent">Contact Messages</h2>
        <div style="margin-top: 2rem;" id="messagesContainer">
          <!-- Messages inject here -->
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import api from './js/api.js';
    import { showAlert } from './js/app.js';

    document.addEventListener('DOMContentLoaded', () => {
      const loginView = document.getElementById('loginView');
      const dashboardView = document.getElementById('dashboardView');
      
      const checkAuth = () => {
        const token = localStorage.getItem('adminToken');
        if (token) {
          loginView.style.display = 'none';
          dashboardView.style.display = 'flex';
          loadDashboardData();
        } else {
          loginView.style.display = 'block';
          dashboardView.style.display = 'none';
        }
      };

      // Login Logic
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        const { error, data } = await api.adminLogin({ username, password });
        if (error) {
          showAlert('loginAlert', error, 'error');
        } else {
          localStorage.setItem('adminToken', data.token);
          checkAuth();
        }
      });

      // Logout Logic
      document.getElementById('navLogout').addEventListener('click', () => {
        localStorage.removeItem('adminToken');
        window.location.reload();
      });

      // Tab Switching
      const tabs = {
        menu: { nav: document.getElementById('navMenu'), section: document.getElementById('tabMenu') },
        res: { nav: document.getElementById('navRes'), section: document.getElementById('tabRes') },
        messages: { nav: document.getElementById('navMessages'), section: document.getElementById('tabMessages') }
      };

      Object.keys(tabs).forEach(key => {
        tabs[key].nav.addEventListener('click', (e) => {
          e.preventDefault();
          Object.values(tabs).forEach(t => {
            t.nav.classList.remove('active');
            t.section.style.display = 'none';
          });
          tabs[key].nav.classList.add('active');
          tabs[key].section.style.display = 'block';
        });
      });

      // Dashboard Data Loading
      async function loadDashboardData() {
        // Load Menu
        const menuData = await api.getMenu();
        const menuTbody = document.getElementById('menuTableBody');
        if (!menuData.error) {
          menuTbody.innerHTML = menuData.data.map(item => `
            <tr>
              <td>${item.name}</td>
              <td>${item.category}</td>
              <td>$${item.price}</td>
              <td><button class="action-btn delete" onclick="window.deleteItem('${item._id}')">Delete</button></td>
            </tr>
          `).join('');
        }

        // Load Reservations
        const resData = await api.getReservations();
        const resTbody = document.getElementById('resTableBody');
        if (!resData.error && resData.data) {
          resTbody.innerHTML = resData.data.map(res => `
            <tr>
              <td>${res.date} at ${res.time}</td>
              <td>${res.name}</td>
              <td>${res.email}<br><small>${res.phone}</small></td>
              <td>${res.guests}</td>
            </tr>
          `).join('');
        } else {
          resTbody.innerHTML = '<tr><td colspan="4">Could not load reservations. Make sure backend is running.</td></tr>';
        }

        // Load Messages
        const msgData = await api.getContacts();
        const msgContainer = document.getElementById('messagesContainer');
        if (!msgData.error && msgData.data) {
          msgContainer.innerHTML = msgData.data.map(msg => `
            <div style="background: var(--bg-secondary); padding: 1.5rem; margin-bottom: 1rem; border-left: 4px solid var(--accent); border-radius: 4px;">
              <div style="display: flex; justify-content: space-between;">
                <strong>${msg.name} (<a href="mailto:${msg.email}" class="text-accent">${msg.email}</a>)</strong>
                <small class="text-muted">${new Date(msg.createdAt).toLocaleDateString()}</small>
              </div>
              <p style="margin-top: 1rem;">${msg.message}</p>
            </div>
          `).join('');
        }
      }

      // Add Menu Item Handling
      document.getElementById('addMenuForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        data.price = Number(data.price);

        const res = await api.addMenuItem(data);
        if (res.error) {
          showAlert('menuAlert', res.error, 'error');
        } else {
          showAlert('menuAlert', 'Item added!', 'success');
          form.reset();
          loadDashboardData();
        }
      });

      // Global delete item function for inline HTML handler
      window.deleteItem = async (id) => {
        if(confirm('Are you sure you want to delete this menu item?')) {
          const res = await api.deleteMenuItem(id);
          if(!res.error) loadDashboardData();
          else alert('Error deleting item: ' + res.error);
        }
      };

      checkAuth();
    });
  </script>
</body>
</html>
