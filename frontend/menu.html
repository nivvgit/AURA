<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - Aura</title>
  <meta name="description" content="Explore the diverse and delicious menu at Aura.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Category Tabs */
    .menu-tabs {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }
    .menu-tab {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 0.5rem 1.5rem;
      border-radius: 30px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 500;
      transition: var(--transition);
    }
    .menu-tab:hover, .menu-tab.active {
      background-color: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <div class="logo">AURA</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html" class="active">Menu</a></li>
        <li><a href="reservation.html">Reservation</a></li>
        <li><a href="reviews.html">Reviews</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="mobile-menu-btn">☰</button>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="hero" style="height: 40vh; background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
    <div class="container hero-content">
      <h1 style="font-size: 3.5rem;">Our Menu</h1>
    </div>
  </header>

  <section class="section container">
    <div class="menu-tabs" id="categoryTabs">
      <button class="menu-tab active" data-category="All">All</button>
      <button class="menu-tab" data-category="Starters">Starters</button>
      <button class="menu-tab" data-category="Main Course">Main Course</button>
      <button class="menu-tab" data-category="Desserts">Desserts</button>
      <button class="menu-tab" data-category="Drinks">Drinks</button>
    </div>

    <div id="loader" class="text-center" style="padding: 2rem;"><p>Loading exquisite dishes...</p></div>
    
    <div class="grid-3" id="menuGrid">
      <!-- Menu items injected via JS -->
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        &copy; 2026 Aura Fine Dining. All rights reserved.
      </div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import api from './js/api.js';
    
    document.addEventListener('DOMContentLoaded', async () => {
      const menuGrid = document.getElementById('menuGrid');
      const loader = document.getElementById('loader');
      let allItems = [];

      try {
        const { error, data } = await api.getMenu();
        if (error) throw new Error(error);
        
        allItems = data;
        renderMenu(allItems);
        loader.style.display = 'none';
      } catch (err) {
        loader.innerHTML = `<p class="text-accent">Unable to load menu: ${err.message}</p>`;
      }

      // Tab logic
      const tabs = document.querySelectorAll('.menu-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
          tabs.forEach(t => t.classList.remove('active'));
          e.target.classList.add('active');
          const category = e.target.getAttribute('data-category');
          
          if (category === 'All') {
            renderMenu(allItems);
          } else {
            const filtered = allItems.filter(item => item.category === category);
            renderMenu(filtered);
          }
        });
      });

      function renderMenu(items) {
        menuGrid.innerHTML = '';
        if (items.length === 0) {
          menuGrid.innerHTML = '<p class="text-muted" style="grid-column: 1/-1; text-align: center;">No items found in this category.</p>';
          return;
        }

        items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <img src="${item.imageUrl}" alt="${item.name}" class="card-img">
            <div class="card-content">
              <div class="card-header">
                <h3 class="card-title">${item.name}</h3>
                <span class="card-price">$${item.price.toFixed(2)}</span>
              </div>
              <p class="card-desc">${item.description}</p>
            </div>
          `;
          menuGrid.appendChild(card);
        });
      }
    });
  </script>
</body>
</html>
