<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviews - Aura</title>
  <meta name="description" content="See what our customers are saying about Aura.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .star-rating {
      color: var(--accent);
      font-size: 1.2rem;
    }
    .review-card {
      background-color: var(--bg-secondary);
      padding: 2rem;
      border-radius: 8px;
      border-left: 4px solid var(--accent);
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <div class="logo">AURA</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="reservation.html">Reservation</a></li>
        <li><a href="reviews.html" class="active">Reviews</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="mobile-menu-btn">☰</button>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="hero" style="height: 40vh; background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1559339352-11d035aa65de?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
    <div class="container hero-content">
      <h1 style="font-size: 3.5rem;">Guest Experiences</h1>
    </div>
  </header>

  <section class="section container">
    <div class="grid-2">
      <!-- Reviews List -->
      <div>
        <h2 class="section-title text-accent">Recent Reviews</h2>
        <div id="reviewsList">
          <p>Loading reviews...</p>
        </div>
      </div>

      <!-- Submit Review Form -->
      <div style="background-color: var(--bg-secondary); padding: 2rem; border-radius: 8px;">
        <h3 class="text-accent" style="margin-bottom: 1.5rem;">Leave a Review</h3>
        <div id="alertBox"></div>
        <form id="reviewForm">
          <div class="form-group">
            <label class="form-label">Your Name</label>
            <input type="text" class="form-control" name="author" required>
          </div>
          <div class="form-group">
            <label class="form-label">Rating</label>
            <select class="form-control" name="rating" required>
              <option value="5">⭐⭐⭐⭐⭐ (5/5)</option>
              <option value="4">⭐⭐⭐⭐ (4/5)</option>
              <option value="3">⭐⭐⭐ (3/5)</option>
              <option value="2">⭐⭐ (2/5)</option>
              <option value="1">⭐ (1/5)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Review</label>
            <textarea class="form-control" name="comment" required></textarea>
          </div>
          <button type="submit" class="btn" id="submitBtn">Submit Review</button>
        </form>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        &copy; 2026 Aura Fine Dining. All rights reserved.
      </div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import api from './js/api.js';
    import { showAlert } from './js/app.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const reviewsList = document.getElementById('reviewsList');
      const form = document.getElementById('reviewForm');
      const submitBtn = document.getElementById('submitBtn');

      const fetchReviews = async () => {
        try {
          const { error, data } = await api.getReviews();
          if (error) throw new Error(error);

          if (data.length === 0) {
            reviewsList.innerHTML = '<p class="text-muted">No reviews yet. Be the first!</p>';
            return;
          }

          reviewsList.innerHTML = data.map(r => `
            <div class="review-card">
              <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                <strong>${r.author}</strong>
                <span class="star-rating">${'⭐'.repeat(r.rating)}</span>
              </div>
              <p style="color: var(--text-muted); font-style: italic;">"${r.comment}"</p>
              <small style="color: #666; display: block; margin-top: 1rem;">${new Date(r.createdAt).toLocaleDateString()}</small>
            </div>
          `).join('');
        } catch (err) {
          reviewsList.innerHTML = `<p class="text-accent">Failed to load reviews.</p>`;
        }
      };

      await fetchReviews();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.disabled = true;

        const formData = new FormData(form);
        const data = {
          author: formData.get('author'),
          rating: Number(formData.get('rating')),
          comment: formData.get('comment')
        };

        const response = await api.submitReview(data);

        if (response.error) {
          showAlert('alertBox', response.error, 'error');
        } else {
          showAlert('alertBox', 'Review submitted successfully!', 'success');
          form.reset();
          await fetchReviews();
        }

        submitBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
