<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservations - Aura</title>
  <meta name="description" content="Book your table at Aura.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .reservation-box {
      background-color: var(--bg-secondary);
      padding: 3rem;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <div class="logo">AURA</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="menu.html">Menu</a></li>
        <li><a href="reservation.html" class="active">Reservation</a></li>
        <li><a href="reviews.html">Reviews</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="mobile-menu-btn">☰</button>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="hero" style="height: 40vh; background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1544148103-0773bf10d330?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');">
    <div class="container hero-content">
      <h1 style="font-size: 3.5rem;">Book a Table</h1>
    </div>
  </header>

  <section class="section container">
    <div class="reservation-box">
      <div class="text-center">
        <h2 class="section-title text-accent" style="font-size: 2rem;">Reserve Now</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Secure your spot for an unforgettable night.</p>
      </div>

      <div id="alertBox"></div>

      <form id="resForm">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" name="name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" name="email" required placeholder="john@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" name="phone" required placeholder="+1 234 567 8900">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" name="date" required id="dateInput">
          </div>
          <div class="form-group">
            <label class="form-label">Time</label>
            <input type="time" class="form-control" name="time" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Number of Guests</label>
          <input type="number" class="form-control" name="guests" min="1" max="20" required value="2">
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;" id="submitBtn">Confirm Reservation</button>
      </form>
    </div>
  </section>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        &copy; 2026 Aura Fine Dining. All rights reserved.
      </div>
    </div>
  </footer>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    import api from './js/api.js';
    import { showAlert } from './js/app.js';

    document.addEventListener('DOMContentLoaded', () => {
      // Set min date to today
      const dateInput = document.getElementById('dateInput');
      const today = new Date().toISOString().split('T')[0];
      dateInput.setAttribute('min', today);

      const form = document.getElementById('resForm');
      const submitBtn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.textContent = 'Booking...';
        submitBtn.disabled = true;

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        const response = await api.createReservation(data);

        if (response.error) {
          showAlert('alertBox', `Failed to book: ${response.error}`, 'error');
        } else {
          showAlert('alertBox', 'Table reserved successfully! Check your email.', 'success');
          form.reset();
        }

        submitBtn.textContent = 'Confirm Reservation';
        submitBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
